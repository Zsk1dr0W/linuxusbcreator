name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc meson ninja-build libglib2.0-dev libgtk-4-dev libadwaita-1-dev desktop-file-utils appstream-util
      - name: Configure
        run: meson setup _build -Db_sanitize=address,undefined
      - name: Build
        run: meson compile -C _build
      - name: Test
        run: meson test -C _build --print-errorlogs

  build-fedora:
    runs-on: ubuntu-24.04
    container: fedora:42
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: dnf install --assumeyes gcc meson ninja-build glib2-devel gtk4-devel libadwaita-devel desktop-file-utils libappstream-glib
      - name: Configure
        run: meson setup _build
      - name: Build
        run: meson compile -C _build
      - name: Test
        run: meson test -C _build --print-errorlogs

  package-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential debhelper meson libglib2.0-dev libgtk-4-dev libadwaita-1-dev
      - name: Stage Debian metadata
        run: cp -a packaging/debian debian
      - name: Build DEB
        run: dpkg-buildpackage --build=binary --no-sign
      - name: Collect DEB
        run: |
          mkdir -p dist
          cp ../*.deb dist/
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          if-no-files-found: error

  package-rpm:
    runs-on: ubuntu-24.04
    container: fedora:42
    steps:
      - uses: actions/checkout@v4
      - name: Install packaging dependencies
        run: dnf install --assumeyes gcc git meson rpm-build xz glib2-devel gtk4-devel libadwaita-devel desktop-file-utils libappstream-glib
      - name: Create source archive
        run: |
          mkdir -p rpmbuild/BUILD rpmbuild/BUILDROOT rpmbuild/RPMS rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/SRPMS
          tar --exclude=.git --exclude=rpmbuild --transform='s,^,linuxusbcreator-0.1.0/,' -cJf rpmbuild/SOURCES/linuxusbcreator-0.1.0.tar.xz .
          cp packaging/rpm/linuxusbcreator.spec rpmbuild/SPECS/
      - name: Build RPM
        run: rpmbuild --define "_topdir $GITHUB_WORKSPACE/rpmbuild" -ba rpmbuild/SPECS/linuxusbcreator.spec
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: |
            rpmbuild/RPMS/**/*.rpm
            rpmbuild/SRPMS/*.rpm
          if-no-files-found: error
